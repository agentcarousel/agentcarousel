name: releasing

# Build release binaries on tag or manual dispatch, then publish a GitHub Release
# on this repository.
#
# Required secret: none beyond the automatic GITHUB_TOKEN (contents: write granted below).
# Optional secret: AGENTCAROUSEL_JUDGE_KEY — needed only for the nightly eval job in agentcarousel.yml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.2.0 or 0.2.0)"
        required: true
        type: string
      dry_run:
        description: "Build and package only; do not create GitHub release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: Release gate (fmt, clippy, test)
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Check bundle manifest hashes are current
        run: |
          cargo build --release -p agentcarousel
          for bundle_dir in fixtures/bundles/*/; do
            ./target/release/agentcarousel bundle pack "${bundle_dir%/}"
          done
          if ! git diff --exit-code fixtures/bundles/; then
            echo "::error::Bundle manifest sha256 values are stale. Run 'agentcarousel bundle pack' on each bundle and commit the updated manifests."
            exit 1
          fi

      - id: meta
        name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          case "${RAW}" in
            v*) TAG="${RAW}" ;;
            *) TAG="v${RAW}" ;;
          esac
          echo "release_tag=${TAG}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        # Cross-compile aarch64-unknown-linux-gnu from ubuntu-latest (see install step below)
        # rather than using ubuntu-*-arm runners, which have a smaller free-tier pool.
        # macos-13 is retired. Prefer x86_64-apple-darwin on macos-latest (ARM): same runner pool as
        # aarch64-apple-darwin; avoids Intel-only labels that can queue or require larger runners.
        include:
          # Linux x64 (gnu)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            name: linux_amd64
            can_run: true
            linker: ""
          # Linux x64 (musl) — statically linked, no glibc dependency
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            name: linux_musl_amd64
            can_run: true
            linker: ""
          # Linux ARM64 (gnu)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            name: linux_arm64
            can_run: false
            linker: aarch64-linux-gnu-gcc
          # Linux ARM64 (musl) — statically linked, no glibc dependency
          # (Alpine Linux on aarch64 needs this; #284)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            archive: tar.gz
            name: linux_musl_arm64
            can_run: true
            linker: ""
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-15
            archive: tar.gz
            name: darwin_amd64
            can_run: true
            linker: ""
          # macOS Apple Silicon (native)
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            name: darwin_arm64
            can_run: true
            linker: ""
          # Windows x64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            archive: zip
            name: windows_amd64
            can_run: false
            linker: x86_64-w64-mingw32-gcc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Install musl-tools (for musl targets)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross toolchains
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          elif [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            sudo apt-get install -y mingw-w64 zip
          fi

      - name: Fix MinGW import library case
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          libkernel32="$(x86_64-w64-mingw32-gcc -print-file-name=libkernel32.a)"
          libdir="$(dirname "$libkernel32")"
          if [ "$libkernel32" = "libkernel32.a" ] || [ ! -f "$libkernel32" ]; then
            echo "Could not locate libkernel32.a"
            exit 1
          fi
          sudo ln -sf "$libkernel32" "$libdir/libKernel32.a"

      - name: Configure cross linker
        if: matrix.linker != ''
        run: |
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"
              ;;
            x86_64-pc-windows-gnu)
              echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"
              ;;
          esac

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: release-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p agentcarousel --target "${{ matrix.target }}"

      - name: Record cross-build verification strategy
        if: ${{ !matrix.can_run }}
        run: |
          echo "Cross-built target ${{ matrix.target }} cannot be executed on ${{ runner.os }}."
          echo "Relying on tag/Cargo.toml preflight and successful link output instead."


      - name: Package artifact
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.gate.outputs.release_tag }}
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            BIN="target/${{ matrix.target }}/release/agentcarousel.exe"
          else
            BIN="target/${{ matrix.target }}/release/agentcarousel"
          fi
          bash packaging/publish-distribution.sh pack "${RELEASE_TAG}" "${{ matrix.target }}" "${BIN}" dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  publish:
    name: Checksums, scan, and GitHub release
    needs: [gate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: release-assets

      - name: Attach install.sh to release assets
        run: cp packaging/install.sh release-assets/install.sh

      - name: Write SHA256SUMS and scan
        run: |
          bash packaging/publish-distribution.sh checksums release-assets
          bash packaging/publish-distribution.sh scan-release-dir release-assets
          ls -la release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.gate.outputs.release_tag }}
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run: skipping gh release create."
            exit 0
          fi
          gh release create "${RELEASE_TAG}" release-assets/* \
            --title "${RELEASE_TAG}" \
            --notes "Binary release for ${RELEASE_TAG}. See install.sh or README for installation."

  publish-crates:
    name: Publish to crates.io
    needs: [gate, publish]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish agentcarousel
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: './crates/agentcarousel'

  update-tap:
    name: Update Homebrew Tap
    needs: [gate, publish]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Tap Repository
        uses: actions/checkout@v4
        with:
          repository: agentcarousel/homebrew-agentcarousel
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        run: |
          TAG=${{ needs.gate.outputs.release_tag }}
          bash packaging/update-homebrew.sh "${TAG}" "homebrew-tap/Formula/agentcarousel.rb"

      - name: Commit and Push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentcarousel.rb
          if git diff --staged --quiet; then
            echo "No changes to formula."
          else
            git commit -m "Update agentcarousel to ${{ needs.gate.outputs.release_tag }}"
            git push
          fi
