name: smoke

# Prove binaries against curated fixtures (no API keys).
# Prefers a released tarball when GitHub Releases exist; otherwise builds from source.

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.4.0); leave empty for latest GitHub release, or build-from-source if none"
        required: false
        type: string
  schedule:
    - cron: "0 15 * * 1"

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            triple: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag or build-from-source
        id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION}" ]; then
            TAG="${INPUT_VERSION}"
            case "${TAG}" in v*) ;; *) TAG="v${TAG}" ;; esac
            echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
            echo "source=release" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Authenticated request: higher rate limits and stable behavior on GHA runners.
          tmp="$(mktemp)"
          code="$(curl -sS -w "%{http_code}" -o "${tmp}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/latest")"
          if [ "${code}" = "200" ]; then
            TAG="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))[\"tag_name\"])" "${tmp}")"
            rm -f "${tmp}"
            case "${TAG}" in v*) ;; *) TAG="v${TAG}" ;; esac
            echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
            echo "source=release" >> "${GITHUB_OUTPUT}"
          else
            rm -f "${tmp}"
            echo "No GitHub release found (HTTP ${code}); building agentcarousel from source." >&2
            echo "source=build" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download and extract release binary
        if: steps.ver.outputs.source == 'release'
        shell: bash
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail
          ASSET="agentcarousel-${TAG}-${TRIPLE}.tar.gz"
          URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"
          echo "Downloading ${URL}"
          curl -fL --retry 3 --retry-delay 1 -o "dist.tar.gz" "${URL}"
          tar -xzf "dist.tar.gz"
          chmod +x agentcarousel
          echo "${PWD}" >> "${GITHUB_PATH}"

      - name: Install Rust (build fallback)
        if: steps.ver.outputs.source == 'build'
        uses: dtolnay/rust-toolchain@stable

      - name: Build agentcarousel from source
        if: steps.ver.outputs.source == 'build'
        run: cargo build --release -p agentcarousel

      - name: Use binary from cargo build
        if: steps.ver.outputs.source == 'build'
        run: echo "$(pwd)/target/release" >> "${GITHUB_PATH}"

      - name: Validate good fixture
        run: agentcarousel validate fixtures/skills/example-skill.yaml

      - name: Validate bad fixture (expect failure)
        shell: bash
        run: |
          set +e
          agentcarousel validate fixtures/examples/invalid-skill.yaml
          code=$?
          set -e
          if [ "${code}" -eq 0 ]; then
            echo "expected validate to fail for invalid-skill fixture"
            exit 1
          fi

      - name: Offline smoke tests
        run: agentcarousel test fixtures/skills/example-skill.yaml --offline true --filter-tags smoke
