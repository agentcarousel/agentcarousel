name: packaging

# Publish distribution artifacts after a GitHub release is created by releasing.yml.
# Triggered by the release event so it runs only when a real release exists, not on
# every tag push or dry-run dispatch.
#
# Required secrets:
#   CARGO_REGISTRY_TOKEN — crates.io publish token
#   HOMEBREW_TAP_TOKEN   — PAT with write access to agentcarousel/homebrew-agentcarousel

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish agentcarousel
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: './crates/agentcarousel'

  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Tap Repository
        uses: actions/checkout@v4
        with:
          repository: agentcarousel/homebrew-agentcarousel
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        run: |
          TAG="${{ github.event.release.tag_name }}"
          bash packaging/update-homebrew.sh "${TAG}" "homebrew-tap/Formula/agentcarousel.rb"

      - name: Commit and Push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentcarousel.rb
          if git diff --staged --quiet; then
            echo "No changes to formula."
          else
            git commit -m "Update agentcarousel to ${{ github.event.release.tag_name }}"
            git push
          fi
