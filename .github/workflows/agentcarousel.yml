# PR and main-branch CI for the Rust workspace. Enable secret scanning and
# dependency review in the repository Settings.
name: agentcarousel

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"

jobs:
  rust-ci:
    name: Rust CI (PR gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test

  validate:
    name: Validate fixtures (PR gate)
    runs-on: ubuntu-latest
    needs: rust-ci
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Build agentcarousel (release)
        run: cargo build --release -p agentcarousel
      - name: Validate
        run: |
          ./target/release/agentcarousel validate fixtures/ --json | tee validate-report.json
      - name: Optional jq smoke on ATF summary
        run: jq -e '.data.atf_summary.fixture_files_loaded > 0' validate-report.json
      - name: Upload validate report
        uses: actions/upload-artifact@v4
        with:
          name: validate-report
          path: validate-report.json
      - name: Bundle verify (contract)
        run: |
          ./target/release/agentcarousel bundle verify fixtures/customer-support
          ./target/release/agentcarousel bundle verify fixtures/customer-support/bundle.manifest.json
          ./target/release/agentcarousel bundle verify fixtures/code-reviewer
          ./target/release/agentcarousel bundle verify fixtures/code-reviewer/bundle.manifest.json
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: agentcarousel-linux
          path: target/release/agentcarousel
          retention-days: 1

  offline-fixtures:
    name: Offline smoke tests
    runs-on: ubuntu-latest
    needs: [rust-ci, validate]
    steps:
      - uses: actions/checkout@v4
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: agentcarousel-linux
          path: target/release
      - name: Make binary executable
        run: chmod +x target/release/agentcarousel
      - name: Run offline smoke tests
        run: |
          ./target/release/agentcarousel test fixtures/ \
            --filter-tags smoke \
            --offline true | tee test-results-smoke.json
      - name: Upload test results (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: test-results-smoke
          path: test-results-smoke.json

  eval-nightly:
    name: Eval harness (nightly, certification track)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Build agentcarousel (release)
        run: cargo build --release -p agentcarousel
      - name: Eval all certification-tagged cases
        env:
          AGENTCAROUSEL_JUDGE_KEY: ${{ secrets.AGENTCAROUSEL_JUDGE_KEY }}
        run: |
          ./target/release/agentcarousel eval fixtures/ \
            --filter-tags certification \
            --evaluator all \
            --runs 5 \
            --judge \
            > eval-results.json
      - name: Upload eval artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.json
      - name: Regression check
        run: |
          PREV=$(./target/release/agentcarousel report list --limit 2 --json | jq -r '.data.runs[1].id // empty')
          if [ -n "$PREV" ]; then
            CURR=$(./target/release/agentcarousel report list --limit 1 --json | jq -r '.data.runs[0].id')
            ./target/release/agentcarousel report diff "$PREV" "$CURR"
          fi
