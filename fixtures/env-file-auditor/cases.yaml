# agentcarousel fixture — env-file-auditor
# Certification Tier: Candidate
# Source skill: .env file secret and misconfiguration auditing agent
# Golden files:  fixtures/env-file-auditor/golden/
# Bundle:        fixtures/bundles/env-file-auditor/bundle.manifest.json

schema_version: 1
skill_or_agent: env-file-auditor

bundle_id: agentcarousel/env-file-auditor
bundle_version: 1.0.0
certification_track: candidate
risk_tier: medium
data_handling: synthetic-only

defaults:
  timeout_secs: 45
  tags: [security, secrets, devops, nightly, certification]
  evaluator: rules

cases:

  # ── Case 1: Live credentials + weak JWT secret (smoke + certification) ─────────
  - id: env-file-auditor/positive-live-credentials-weak-secret
    description: >
      .env file contains a Stripe live-mode API key, a production DATABASE_URL with
      password embedded in the URL, and a JWT_SECRET with insufficient entropy.
      Agent must flag all three with distinct findings and recommend rotation/replacement.
    tags: [smoke, happy-path, security, secrets, certification]
    seed: 2001

    input:
      messages:
        - role: user
          content: |
            Audit this .env file for security issues:

            DATABASE_URL=postgres://dbadmin:Tr0ub4dor&3@prod.db.example.com:5432/appdb
            STRIPE_SECRET_KEY=sk_live_4eC39HqLyjWDarjtT1zdp7dc
            JWT_SECRET=mysecret
            NODE_ENV=development
            PORT=3000
            LOG_LEVEL=debug

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(STRIPE|sk_live|live.*key|production.*key)'
        - kind: regex
          value: '(?i)(JWT_SECRET|weak|short|entropy|rotate|insufficient)'
        - kind: regex
          value: '(?i)(DATABASE_URL|password.*URL|credential.*URL)'
        - kind: not_contains
          value: "PORT is a security risk"
        - kind: not_contains
          value: "LOG_LEVEL is dangerous"

      rubric:
        - id: live-stripe-key-flagged
          description: >
            Agent flags STRIPE_SECRET_KEY with sk_live_ prefix as a live-mode production
            secret. A perfect score explains the risk of this key leaking (financial
            transactions can be initiated).
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(sk_live|Stripe.*live|live.*mode|production.*key)'

        - id: weak-jwt-flagged
          description: >
            Agent flags JWT_SECRET=mysecret as a weak value with insufficient entropy
            for signing tokens. A perfect score recommends a cryptographically random
            secret of at least 32 bytes.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(JWT_SECRET|weak.*secret|mysecret|entropy|random.*bytes|32.*bytes|short)'

        - id: database-url-credential-flagged
          description: >
            Agent flags the password embedded in DATABASE_URL — credentials in connection
            strings are often accidentally logged or exposed in error output.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(DATABASE_URL|password.*URL|embed.*credential|connection.*string.*password)'

        - id: innocuous-vars-not-flagged
          description: >
            Agent does not flag PORT=3000 or LOG_LEVEL=debug as security issues.
          weight: 0.15
          auto_check:
            kind: not_contains
            value: "PORT=3000 is"

  # ── Case 2: Placeholder and TODO values ──────────────────────────────────────
  - id: env-file-auditor/positive-placeholder-values
    description: >
      .env file contains placeholder values that have never been replaced: CHANGEME,
      your-api-key-here, and TODO. Agent must flag these as unset configuration —
      not actual secrets — and must not flag PORT or TIMEOUT as security concerns.
    tags: [happy-path, security, secrets]
    seed: 2002

    input:
      messages:
        - role: user
          content: |
            Audit this .env file:

            DATABASE_URL=postgres://user:CHANGEME@localhost:5432/app
            THIRD_PARTY_API_KEY=your-api-key-here
            WEBHOOK_SECRET=TODO
            PORT=3000
            REQUEST_TIMEOUT_MS=5000

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(CHANGEME|placeholder|not set|incomplete|TODO|your-api-key)'
        - kind: not_contains
          value: "PORT is"
        - kind: not_contains
          value: "REQUEST_TIMEOUT"

      rubric:
        - id: placeholders-flagged
          description: >
            Agent flags CHANGEME, your-api-key-here, and TODO as unset placeholder
            values that must be replaced before deployment. A perfect score names all three.
          weight: 0.65
          auto_check:
            kind: regex
            value: '(?i)(CHANGEME|your-api-key-here|TODO.*WEBHOOK|placeholder)'

        - id: non-secrets-not-flagged
          description: >
            PORT=3000 and REQUEST_TIMEOUT_MS=5000 are not flagged as security concerns.
          weight: 0.35
          auto_check:
            kind: not_contains
            value: "PORT=3000 is a"

  # ── Case 3: Clean .env — approve ─────────────────────────────────────────────
  - id: env-file-auditor/positive-clean-approval
    description: >
      .env file uses environment variable references (not literal secrets), has a
      strong JWT secret placeholder comment, and no live credentials. Agent must
      approve without fabricating findings.
    tags: [happy-path, security, secrets, certification]
    seed: 2003
    timeout_secs: 25

    input:
      messages:
        - role: user
          content: |
            Audit this .env file:

            # Application
            NODE_ENV=production
            PORT=8080

            # Database — set via CI/CD secrets injection
            DATABASE_URL=${DATABASE_URL}

            # Auth — generated with: openssl rand -hex 32
            JWT_SECRET=${JWT_SECRET}

            # Stripe — test mode only in this environment
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(clean|looks good|no.*issue|approve|well.configured|no.*secret|good.*practice)'
        - kind: not_contains
          value: "weak secret"
        - kind: not_contains
          value: "sk_live"
        - kind: not_contains
          value: "placeholder"

      rubric:
        - id: approval-given
          description: >
            Agent approves the file — secrets are injected via environment variable
            references, not hard-coded. A perfect score notes this pattern positively.
          weight: 0.70
          auto_check:
            kind: regex
            value: '(?i)(looks good|approve|no.*hardcode|variable.*reference|clean|well.structured)'

        - id: no-fabricated-findings
          description: >
            Agent does not invent findings for the variable-reference pattern
            (${DATABASE_URL} is correct practice) or the comment about openssl.
          weight: 0.30
          auto_check:
            kind: not_contains
            value: "weak"

    evaluator_config:
      evaluator: golden
      golden_path: fixtures/env-file-auditor/golden/clean-approval.txt
      golden_threshold: 0.65
      effectiveness_threshold: 0.6

  # ── Case 4: Production credentials in development-labeled file ───────────────
  - id: env-file-auditor/edge-case-env-purpose-mismatch
    description: >
      A file named .env.development contains live production credentials alongside
      NODE_ENV=development. This env/purpose mismatch is a dangerous configuration
      that may result in production operations being triggered from a developer machine.
      Agent must flag the mismatch specifically.
    tags: [edge-case, security, secrets, certification]
    seed: 2004

    input:
      messages:
        - role: user
          content: |
            Audit this .env.development file:

            NODE_ENV=development
            DATABASE_URL=postgres://admin:pr0dP4ss!@prod.db.example.com:5432/production
            S3_BUCKET=mycompany-prod-user-uploads
            AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
            AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
            STRIPE_SECRET_KEY=sk_live_4eC39HqLyjWDarjtT1zdp7dc

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(mismatch|development.*production|prod.*dev|wrong.*env|dangerous.*combin)'
        - kind: regex
          value: '(?i)(sk_live|prod\.db|production.*database|live.*stripe|AWS.*prod)'

      rubric:
        - id: env-mismatch-flagged
          description: >
            Agent explicitly flags the contradiction: NODE_ENV=development with
            live production credentials. A perfect score explains the risk — developer
            operations (tests, migrations, scripts) will hit the production database
            and live payment processor.
          weight: 0.45
          auto_check:
            kind: regex
            value: '(?i)(mismatch|development.*production|dev.*prod.*credential|NODE_ENV.*development.*prod)'

        - id: live-credentials-flagged
          description: >
            Agent independently flags sk_live_ Stripe key, production DATABASE_URL,
            and AWS credentials as high-severity exposures.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(sk_live|prod.*database|AWS.*KEY|live.*credential|production.*credential)'

        - id: blast-radius-explained
          description: >
            Agent explains what could go wrong: test data written to production, live
            charges processed, production files deleted from S3.
          weight: 0.15
          auto_check:
            kind: regex
            value: '(?i)(test.*production|live.*charge|production.*data|accidental.*prod|dev.*script.*prod)'

  # ── Case 5: No .env content provided ─────────────────────────────────────────
  - id: env-file-auditor/failure-mode-no-content
    description: >
      User asks to audit a .env file but provides no content. Agent must request
      the file content rather than generating speculative findings.
    tags: [error-handling, security, secrets]
    timeout_secs: 20

    input:
      messages:
        - role: user
          content: |
            Can you audit my .env file for security issues?

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(provide|share|paste|send).*(\.env|env file|content|variables)'
        - kind: not_contains
          value: "DATABASE_URL"
        - kind: not_contains
          value: "sk_live"

      rubric:
        - id: content-requested
          description: >
            Agent requests the .env file content before auditing. A perfect score
            also notes what to redact if the user wants to share real secrets
            (replace values with REDACTED while keeping key names).
          weight: 1.0
          auto_check:
            kind: regex
            value: '(?i)(provide|paste|share).*(\.env|content|file)'
