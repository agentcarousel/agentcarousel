# agentcarousel fixture — aibom-auditor
# Certification Tier: Candidate
# Source skill: (aibom-auditor — OWASP AI Bill of Materials audit and generation)
# Intake:        open an issue before large changes
# Golden files:  fixtures/golden/aibom-auditor/
# Bundle:        fixtures/bundles/aibom-auditor/bundle.manifest.json

schema_version: 1
skill_or_agent: aibom-auditor

bundle_id: agentcarousel/aibom-auditor
bundle_version: 1.0.0
certification_track: candidate
risk_tier: high
data_handling: synthetic-only

defaults:
  timeout_secs: 90
  tags: [compliance, aibom, owasp, rba, nightly, certification]
  evaluator: rules

cases:

  # ── Case 1: Full AIBOM generation (smoke + certification) ────────────────────
  - id: aibom-auditor/positive-full-aibom-generation
    description: >
      Given a detailed synthetic AI system description (model, dataset, two tools, one MCP server,
      one system prompt), the skill must produce a complete AIBOM document with all five required
      OWASP AIBOM component types (model, dataset, tool, mcp_server, prompt) and a unique identifier
      (purl or SHA-256) for each component. Golden comparison against sample-aibom.json at 0.75 threshold.
    tags: [smoke, happy-path, compliance, aibom, certification]
    seed: 3001

    input:
      messages:
        - role: user
          content: |
            Generate a complete OWASP AIBOM document for the following AI system:

            System name: Acme Compliance Assistant v2.1.0
            Operator: Acme Defense LLC
            Purpose: Internal NIST 800-171 compliance gap analysis for CUI systems

            Components:
            - Model: gpt-4o-mini (version 2024-07-18) via OpenAI API; text modality; api deployment
            - Dataset: nist-800-171-synthetic-examples v1.0.0; synthetic SSP narratives for NIST SP
              800-171 Rev 2; no real CUI; maintained at github.com/agentcarousel/agentcarousel
            - Tool 1: web-search (Brave Search API v1.2.0); read-only permission scope
            - Tool 2: code-executor (agentcarousel/code-executor v0.9.1); sandboxed isolated
              read-write execution environment
            - MCP Server: filesystem-mcp v1.0.0; transport: stdio; permission-scope: read-only;
              MCP protocol version: 2025-03-26; URI: https://example.com/mcp/filesystem@1.0.0
            - System Prompt: "You are a CMMC 2.0 gap analysis expert..." (SHA-256:
              a4c2f8d9e1b07432f65890abcdef01234567890abcdef01234567890abcdef01);
              approximately 320 tokens

            Produce a complete AIBOM in JSON or structured format. Each component must have a unique
            identifier (purl, SHA-256 hash, or URI).

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(model|LLM|foundation.model)'
        - kind: regex
          value: '(?i)(dataset|training.data|data.source)'
        - kind: regex
          value: '(?i)(tool|plugin|function.calling|web.search|code.exec)'
        - kind: regex
          value: '(?i)(mcp|model.context.protocol|filesystem.mcp)'
        - kind: regex
          value: '(?i)(prompt|system.prompt|instruction)'
        - kind: regex
          value: '(?i)(purl|pkg:|sha256|sha-256|hash|uri)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: component-completeness
          description: >
            All five OWASP AIBOM required component types are present: model, dataset, tool/plugin,
            MCP server, and prompt. A perfect score requires all five types explicitly labeled.
            Missing any one type is a 0.0 on this rubric item.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(model|gpt).{0,200}(dataset|nist).{0,200}(tool|search|exec).{0,200}(mcp|filesystem).{0,200}(prompt|instruction)'

        - id: component-identification
          description: >
            Each component carries a unique, stable identifier: a purl (pkg:...), SHA-256 hash, or URI.
            Names alone are insufficient. A perfect score has an identifier on every component.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(purl|pkg:|sha256:|sha-256:)'

        - id: provenance-fields
          description: >
            Each component includes at minimum name, version or hash, and supplier or source.
            A perfect score has all three fields on every component entry.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(supplier|source|provider|openai|agentcarousel|brave)'

        - id: aibom-structure
          description: >
            The document uses a recognizable structured format: JSON (preferred), YAML, or clearly
            delimited sections. A perfect score produces valid JSON or equivalent machine-parseable
            structure with a components array or equivalent grouping.
          weight: 0.20
          auto_check:
            kind: regex
            value: '(\{|\[|##|---)'

    evaluator_config:
      evaluator: golden
      golden_path: fixtures/golden/aibom-auditor/sample-aibom.json
      golden_threshold: 0.75

  # ── Case 2: Component gap detection ─────────────────────────────────────────
  - id: aibom-auditor/positive-component-gap-detection
    description: >
      Given a partial AIBOM JSON fragment (model and tool components only; dataset component absent;
      MCP server entry present but missing purl), the skill must identify all gaps by component type
      and missing field, categorize their severity, and produce remediation recommendations.
    tags: [happy-path, compliance, aibom, certification]
    seed: 3002

    input:
      messages:
        - role: user
          content: |
            Review the following partial AIBOM and identify any gaps or compliance issues:

            {
              "bomFormat": "AIBOM",
              "specVersion": "1.0",
              "components": [
                {
                  "type": "model",
                  "name": "claude-sonnet-4",
                  "version": "2026-01-15",
                  "purl": "pkg:generic/anthropic/claude-sonnet-4@2026-01-15",
                  "supplier": "Anthropic"
                },
                {
                  "type": "tool",
                  "name": "document-retrieval",
                  "version": "2.0.0",
                  "purl": "pkg:generic/acme/document-retrieval@2.0.0"
                },
                {
                  "type": "mcp_server",
                  "name": "github-mcp",
                  "version": "1.1.0",
                  "transport": "http"
                }
              ]
            }

            This AI system is used for federal procurement processing. Identify all gaps relative
            to OWASP AIBOM requirements, categorize their severity, and provide specific remediation
            steps for each gap.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(gap|missing|absent|not.found|incomplete)'
        - kind: regex
          value: '(?i)(dataset|training.data)'
        - kind: regex
          value: '(?i)(purl|identifier|uri).{0,80}(missing|absent|required|not.present)'
        - kind: regex
          value: '(?i)(remediat|recommend|add|include|provide)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: gap-enumeration
          description: >
            All gaps identified by component type (missing dataset) and missing field (no purl on
            mcp_server). A perfect score enumerates each gap with the specific component type and
            field name, not a general statement about incompleteness.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(dataset|purl|identifier).{0,80}(missing|absent|gap|required|not.present)'

        - id: gap-severity
          description: >
            Gaps are ranked or categorized by severity (critical, high, medium, low) with rationale.
            A perfect score assigns severity to each gap and explains why. Generic severity labels
            without rationale score no higher than 0.5.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(critical|high|medium|low|severity|priority)'

        - id: remediation-specificity
          description: >
            Remediation steps are concrete: not "add the field" but specific guidance on where to
            find the value (e.g., "query the model provider API for the release date and construct
            a purl using pkg:generic/<provider>/<model>@<version>"). Generic advice scores 0.0–0.4.
          weight: 0.35

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an OWASP AIBOM certification judge. Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - gap-enumeration: every gap must name the component type AND the specific missing field
        - gap-severity: severity must have a rationale, not just a label
        - remediation-specificity: advice must name specific sources or actions, not generic guidance

        Canonical prose: docs/judge-prompts/aibom-auditor-v1.md

  # ── Case 3: AIBOM-to-RBA linkage ─────────────────────────────────────────────
  - id: aibom-auditor/positive-aibom-to-rba-linkage
    description: >
      Given a synthetic AIBOM (3 components with purls) and a prose description of an RBA evidence
      bundle that references only 2 of the 3 purls, the skill must verify the linkage, identify the
      unattested component, and produce a coverage summary using the actual identifiers.
    tags: [happy-path, compliance, aibom, rba, certification]
    seed: 3003

    input:
      messages:
        - role: user
          content: |
            I have the following AIBOM for our federal document processing system:

            {
              "components": [
                {
                  "type": "model",
                  "name": "gpt-4o",
                  "purl": "pkg:generic/openai/gpt-4o@2025-11-05"
                },
                {
                  "type": "tool",
                  "name": "pdf-extractor",
                  "purl": "pkg:pypi/pdfplumber@0.11.4"
                },
                {
                  "type": "mcp_server",
                  "name": "s3-mcp",
                  "purl": "pkg:generic/aws/s3-mcp@2.0.1"
                }
              ]
            }

            And I have an RBA evidence bundle from our last agentcarousel run. The bundle's subject
            field lists these AIBOM references:
            - pkg:generic/openai/gpt-4o@2025-11-05
            - pkg:pypi/pdfplumber@0.11.4

            The MCP server (pkg:generic/aws/s3-mcp@2.0.1) is NOT referenced in the RBA subject field.

            Please verify the AIBOM-to-RBA linkage: which components are attested, which are not,
            what is the coverage percentage, and what are the implications for our compliance posture?

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(link|reference|attest|map|cover)'
        - kind: regex
          value: '(?i)(unattested|missing.*rba|rba.*missing|not.*covered|not.*attest)'
        - kind: regex
          value: '(?i)(purl|pkg:|uri|component.ref)'
        - kind: regex
          value: '\d+.*of.*\d+|\d+/\d+|%.*attest|attest.*%|67|66'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: linkage-accuracy
          description: >
            Correctly identifies which AIBOM components are referenced in the RBA (gpt-4o, pdf-extractor)
            and which are not (s3-mcp). A perfect score names the unattested component by its purl,
            not just by name.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(s3.mcp|s3-mcp|aws.s3).{0,80}(unattested|not.*covered|not.*attest|missing)'

        - id: reference-format
          description: >
            Analysis uses the actual purl identifiers from the AIBOM rather than just human-readable
            component names. A perfect score quotes at least one purl string from the AIBOM in context.
          weight: 0.30
          auto_check:
            kind: regex
            value: 'pkg:generic/aws/s3-mcp|pkg:pypi/pdfplumber|pkg:generic/openai/gpt-4o'

        - id: coverage-determination
          description: >
            Produces an explicit coverage statement: percentage or ratio (e.g., "2 of 3 components
            attested, 67% RBA coverage"). A perfect score includes a numeric coverage figure and
            notes the compliance implication of partial coverage.
          weight: 0.35
          auto_check:
            kind: regex
            value: '\d+.*of.*\d+|\d+/\d+|67|66'

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an OWASP AIBOM certification judge assessing RBA linkage quality.
        Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - linkage-accuracy: the unattested component must be identified by purl, not just name
        - reference-format: at least one purl from the AIBOM must appear verbatim in the analysis
        - coverage-determination: numeric ratio or percentage required; implications for compliance noted

        Canonical prose: docs/judge-prompts/aibom-auditor-v1.md

  # ── Case 4: Judge spot-check ─────────────────────────────────────────────────
  - id: aibom-auditor/judge-spot-check
    description: >
      Short synthetic system (model + MCP server only); judge scores whether the skill correctly
      applies OWASP AIBOM component taxonomy and identifier hygiene. Companion to the full generation
      case without repeating the full scenario.
    tags: [certification, judge]

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an OWASP AIBOM certification judge. Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - taxonomy-accuracy: uses OWASP AIBOM component type vocabulary correctly (model, mcp_server);
          does not conflate MCP server with generic tool; does not invent component types
        - identifier-hygiene: references components by purl or URI, not just name; correct purl
          format for the component type described

        Canonical prose: docs/judge-prompts/aibom-auditor-v1.md

    input:
      messages:
        - role: user
          content: |
            Generate AIBOM component entries for the following two-component system:
            1. Model: Gemini 1.5 Pro via Google Cloud Vertex AI, version 001
            2. MCP Server: memory-mcp v0.3.0, transport: stdio, permission: read-write,
               protocol version: 2025-03-26

            Use correct OWASP AIBOM component types and include identifiers.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(model|gemini|vertex)'
        - kind: regex
          value: '(?i)(mcp.server|mcp_server|memory.mcp)'

      rubric:
        - id: taxonomy-accuracy
          description: >
            Uses OWASP AIBOM component type vocabulary correctly. Model labeled as "model" type;
            MCP server labeled as "mcp_server" or equivalent (not "tool"). No invented component types.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(mcp.server|mcp_server|model.context.protocol.*server)'

        - id: identifier-hygiene
          description: >
            Both components carry a unique identifier (purl, URI, or SHA-256). Correct purl format
            for each component type. Names alone are insufficient.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(purl|pkg:|uri:|sha256:)'

  # ── Case 5: Failure mode — no system description ─────────────────────────────
  - id: aibom-auditor/failure-mode-no-system-description
    description: >
      User requests an AIBOM without providing any system description. The skill must request
      the required information rather than generating a fabricated AIBOM. Any fabricated output
      without component inputs is a failing response.
    tags: [error-handling, compliance, aibom]
    timeout_secs: 30

    input:
      messages:
        - role: user
          content: |
            Generate an AIBOM for my AI system.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(describe|provide|tell me|what.*(system|component|model)|system.*description|more.information)'
        - kind: not_contains
          value: "panic"
        - kind: not_contains
          value: '"components":'
        - kind: not_contains
          value: "bomFormat"

      rubric:
        - id: information-request
          description: >
            Skill explicitly requests system description or component details before generating an AIBOM.
            A perfect score asks for the required inputs by name (model, dataset, tools, MCP servers,
            prompts or similar). A vague "please provide more details" scores no higher than 0.5.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(provide|describe|tell me|what).{0,80}(system|component|model|tool|mcp|prompt|dataset)'

        - id: no-fabrication
          description: >
            No AIBOM document is generated without component inputs. A failing response produces any
            JSON structure with a "components" key or "bomFormat" field without real input data.
          weight: 0.50
          auto_check:
            kind: not_contains
            value: '"bomFormat"'

  # ── Case 6: Edge case — MCP server inventory ──────────────────────────────────
  - id: aibom-auditor/edge-case-mcp-server-inventory
    description: >
      User provides three MCP servers with different transports and permission scopes (filesystem-mcp
      stdio read-only, github-mcp HTTP read-write, browser-mcp HTTP read-only). The skill must produce
      AIBOM entries for all three with transport, permission scope, protocol version, and a distinct
      identifier per server. Tests the MCP-specific component type not present in traditional SBOM.
    tags: [edge-case, compliance, aibom, certification]
    seed: 3006

    input:
      messages:
        - role: user
          content: |
            Generate OWASP AIBOM component entries for the following MCP servers used by our
            compliance AI agent:

            1. filesystem-mcp v1.0.0
               - Transport: stdio
               - Permission scope: read-only (working directory only)
               - MCP protocol version: 2025-03-26
               - URI: https://example.com/mcp/filesystem@1.0.0

            2. github-mcp v2.1.0
               - Transport: HTTP/SSE
               - Permission scope: read-write (issues, PRs, code)
               - MCP protocol version: 2025-03-26
               - URI: https://github-mcp.example.com/sse

            3. browser-mcp v0.8.0
               - Transport: HTTP/SSE
               - Permission scope: read-only (no form submission or navigation)
               - MCP protocol version: 2025-03-26
               - URI: https://browser-mcp.example.com/sse

            Include all required AIBOM fields for MCP server components, a unique purl or URI
            identifier for each, and flag any permission scopes that represent elevated risk.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(filesystem.mcp|filesystem-mcp)'
        - kind: regex
          value: '(?i)(github.mcp|github-mcp)'
        - kind: regex
          value: '(?i)(browser.mcp|browser-mcp)'
        - kind: regex
          value: '(?i)(transport|stdio|http|sse)'
        - kind: regex
          value: '(?i)(permission|scope|read.only|read.write)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: mcp-component-fields
          description: >
            Each MCP server entry includes transport type, permission scope, and MCP protocol version.
            A perfect score has all three fields on all three servers. Missing any field on any server
            reduces the score proportionally.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(stdio|http|sse).{0,200}(permission|scope).{0,200}(protocol|2025-03-26)'

        - id: identifier-per-server
          description: >
            Each of the three servers has a distinct identifier: purl, URI, or equivalent. A perfect
            score assigns a unique identifier to each server. Sharing identifiers or omitting
            identifiers scores 0.0.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(pkg:|purl:|uri:).{0,80}(filesystem|mcp)'

        - id: permission-risk-flag
          description: >
            Permission scopes are noted with a risk annotation: at minimum github-mcp (read-write on
            code and issues) should be flagged as elevated risk relative to read-only servers.
            Generic "high risk" labels without rationale score no higher than 0.5.
          weight: 0.25

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an OWASP AIBOM certification judge assessing MCP server component entries.
        Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - mcp-component-fields: all three required fields (transport, permission, protocol version)
          must appear on all three servers
        - identifier-per-server: each server must have its own distinct purl or URI
        - permission-risk-flag: github-mcp read-write is the highest-risk server and must be
          called out; filesystem-mcp read-only and browser-mcp read-only should be noted as lower risk

        Canonical prose: docs/judge-prompts/aibom-auditor-v1.md

  # ── Case 7: Edge case — prompt inventory ─────────────────────────────────────
  - id: aibom-auditor/edge-case-prompt-inventory
    description: >
      User provides three prompt texts (system prompt, RAG retrieval prompt, judge prompt). The skill
      must produce AIBOM prompt component entries for all three, content-addressing each with a
      SHA-256 hash and classifying each by prompt type. Prompts are the most frequently overlooked
      AIBOM component type.
    tags: [edge-case, compliance, aibom, certification]
    seed: 3007

    input:
      messages:
        - role: user
          content: |
            Generate OWASP AIBOM prompt component entries for the following three prompts used by
            our compliance AI system. Hash each prompt and classify it by type.

            PROMPT 1 (System Prompt):
            "You are an expert CMMC 2.0 Level 2 assessor with deep knowledge of NIST SP 800-171 Rev 2.
            Your role is to analyze System Security Plans (SSPs) and produce gap analyses, SPRS scores,
            and POA&M tables. Always cite the specific practice ID (3.x.x) for each finding. Never
            fabricate practice IDs outside the 3.1.x–3.14.x range. If an SSP is missing a required
            section, flag it as a finding rather than assuming compliance. Produce structured output
            with clear section headers. This is a synthetic evaluation environment; no real CUI is
            present."

            PROMPT 2 (RAG Retrieval Prompt):
            "Given the user query and the retrieved document chunks below, synthesize an answer
            focused on CMMC requirements. Cite the source document for each claim. If the retrieved
            chunks do not contain sufficient information to answer the query, say so explicitly rather
            than inferring. Chunks: {retrieved_chunks}"

            PROMPT 3 (Judge Prompt):
            "You are a certification-tier judge for CMMC 2.0 gap analysis outputs. Score each rubric
            item from 0.0 to 1.0. Apply domain knowledge: NIST SP 800-171 Rev 2 practice IDs are
            3.1.x–3.14.x only. SPRS baseline is 110. Return JSON only with keys: rubric and
            overall_rationale."

            For each prompt: compute or estimate a SHA-256 content hash, classify the prompt type,
            and produce a complete AIBOM prompt component entry.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(system.prompt|system prompt)'
        - kind: regex
          value: '(?i)(sha.?256|sha256:|hash|content.hash|fingerprint)'
        - kind: regex
          value: '(?i)(prompt.type|type.*prompt|prompt.*type|system|retrieval|rag|judge)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: prompt-content-addressing
          description: >
            Each prompt component includes a SHA-256 or equivalent content hash as its identifier.
            A perfect score has a hash on every prompt entry. A hash placeholder like "sha256:<compute>"
            is acceptable; an entirely absent hash field is not.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(sha.?256|sha256:|hash.*[a-f0-9]{8}|content.hash)'

        - id: prompt-type-taxonomy
          description: >
            Prompts are classified by type using recognizable vocabulary: system, retrieval (or rag),
            and judge (or evaluation). A perfect score labels each of the three prompts with its type.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(system|retrieval|rag|judge|evaluation).{0,80}prompt'

        - id: all-prompts-covered
          description: >
            All three prompts from the input are represented as separate AIBOM component entries.
            A perfect score has three distinct prompt entries; missing any one scores proportionally.
          weight: 0.25

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an OWASP AIBOM certification judge assessing prompt component entries.
        Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - prompt-content-addressing: every prompt must have a SHA-256 hash field; a placeholder
          "sha256:<compute>" is acceptable if the format is correct; absent hash = 0.0
        - prompt-type-taxonomy: system prompt, RAG/retrieval prompt, and judge prompt must each
          be labeled with their type; conflating types reduces the score
        - all-prompts-covered: verify three distinct prompt entries are present in the output

        Canonical prose: docs/judge-prompts/aibom-auditor-v1.md
