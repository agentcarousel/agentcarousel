# agentcarousel fixture — accessibility-auditor
# Certification Tier: Candidate
# Source skill: WCAG 2.1 accessibility violation review agent for HTML/React
# Golden files:  fixtures/golden/accessibility-auditor/
# Bundle:        fixtures/bundles/accessibility-auditor/bundle.manifest.json

schema_version: 1
skill_or_agent: accessibility-auditor

bundle_id: agentcarousel/accessibility-auditor
bundle_version: 1.0.0
certification_track: candidate
risk_tier: low
data_handling: synthetic-only

defaults:
  timeout_secs: 60
  tags: [accessibility, wcag, a11y, frontend, nightly, certification]
  evaluator: rules

cases:

  # ── Case 1: Missing alt text + div-as-button (smoke + certification) ──────────
  - id: accessibility-auditor/positive-missing-alt-and-div-button
    description: >
      Component has two violations: an <img> without alt text (WCAG 1.1.1) and a
      <div onClick> used as an interactive element without keyboard support (WCAG
      2.1.1 / 4.1.2). Agent must find both and must not flag the explicit <button>
      with text content as a violation.
    tags: [smoke, happy-path, a11y, certification]
    seed: 4001

    input:
      messages:
        - role: user
          content: |
            Review this React component for WCAG 2.1 accessibility violations:

            ```jsx
            function ProductCard({ product, onNavigate }) {
              return (
                <div className="card" onClick={() => onNavigate(`/product/${product.id}`)}>
                  <img src={product.imageUrl} className="product-img" />
                  <h3>{product.name}</h3>
                  <p className="price">${product.price}</p>
                  <button onClick={(e) => { e.stopPropagation(); addToCart(product); }}>
                    Add to cart
                  </button>
                </div>
              );
            }
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(alt|alternative text|1\.1\.1|WCAG.*image|screen reader.*image)'
        - kind: regex
          value: '(?i)(div.*onClick|non-interactive|2\.1\.1|4\.1\.2|keyboard|role.*button|tabIndex)'
        - kind: not_contains
          value: "Add to cart has no label"
        - kind: not_contains
          value: "button is inaccessible"

      rubric:
        - id: missing-alt-flagged
          description: >
            Agent flags missing alt attribute on <img>. A perfect score cites WCAG 1.1.1
            and suggests alt={product.name} for informative images or alt="" if decorative.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(alt.*missing|missing.*alt|1\.1\.1|alt.*attribute|screen.*reader.*img)'

        - id: div-click-handler-flagged
          description: >
            Agent flags <div onClick> as a keyboard-inaccessible interactive element.
            A perfect score recommends replacing with <button> or <a>, or adding
            role="button" + tabIndex={0} + onKeyDown handler.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(div.*onClick|div.*click|keyboard|tabIndex|role.*button|not.*focusable|2\.1\.1)'

        - id: valid-button-not-flagged
          description: >
            Agent does not flag the <button>Add to cart</button> — it has visible text
            content and is a native interactive element.
          weight: 0.20
          auto_check:
            kind: not_contains
            value: "Add to cart has no"

    evaluator_config:
      evaluator: golden
      golden_path: fixtures/golden/accessibility-auditor/product-card-findings.txt
      golden_threshold: 0.65
      effectiveness_threshold: 0.6

  # ── Case 2: Form input without associated label ───────────────────────────────
  - id: accessibility-auditor/positive-form-missing-label
    description: >
      HTML form uses placeholder text as the only label — placeholders disappear
      when the user types, leaving screen reader users without context. Agent must
      flag the missing <label> association and distinguish placeholder from label.
    tags: [happy-path, a11y, certification]
    seed: 4002

    input:
      messages:
        - role: user
          content: |
            Review this HTML form for accessibility violations:

            ```html
            <form id="contact-form">
              <input type="text" name="name" placeholder="Your name" />
              <input type="email" name="email" placeholder="Email address" />
              <textarea name="message" placeholder="Your message"></textarea>
              <button type="submit">Send message</button>
            </form>
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(label|1\.3\.1|WCAG.*label|for.*attribute|htmlFor|aria-label)'
        - kind: regex
          value: '(?i)(placeholder.*not.*label|placeholder.*disappear|placeholder.*insufficient|visible.*label)'
        - kind: not_contains
          value: "button is inaccessible"
        - kind: not_contains
          value: "submit button missing"

      rubric:
        - id: missing-labels-flagged
          description: >
            Agent flags all three inputs (name, email, message) as missing associated
            <label> elements. A perfect score cites WCAG 1.3.1 and suggests <label for>
            or aria-label.
          weight: 0.45
          auto_check:
            kind: regex
            value: '(?i)(label.*missing|missing.*label|1\.3\.1|<label|htmlFor|aria-label)'

        - id: placeholder-limitation-explained
          description: >
            Agent explains that placeholder is not a substitute for a label: it vanishes
            when the user starts typing, leaving screen reader users and users with
            cognitive disabilities without persistent context.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(placeholder.*not.*label|placeholder.*disappear|placeholder.*insufficient|visible.*label.*required)'

        - id: submit-button-not-flagged
          description: >
            <button type="submit">Send message</button> is correctly not flagged —
            it has visible text and is a native button.
          weight: 0.20
          auto_check:
            kind: not_contains
            value: "submit button"

  # ── Case 3: Decorative image with empty alt — do not flag ────────────────────
  - id: accessibility-auditor/negative-decorative-image-correct
    description: >
      Component uses the correct treatment for a decorative image: alt="" combined
      with aria-hidden={true}. Agent must approve this pattern and explicitly not
      flag it as a missing-alt violation — demonstrating precision over recall.
    tags: [edge-case, a11y, certification]
    seed: 4003
    timeout_secs: 25

    input:
      messages:
        - role: user
          content: |
            Review this component for accessibility issues:

            ```jsx
            function PageDivider() {
              return (
                <div className="divider">
                  <img src="/decorative-wave.svg" alt="" aria-hidden={true} />
                </div>
              );
            }
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(correct|appropriate|decorative|no.*issue|looks good|well.implemented|valid)'
        - kind: not_contains
          value: "missing alt"
        - kind: not_contains
          value: "add alt text"
        - kind: not_contains
          value: "alt attribute is empty"

      rubric:
        - id: decorative-treatment-approved
          description: >
            Agent correctly identifies alt="" + aria-hidden={true} as the correct WCAG
            treatment for a purely decorative image. Screen readers will skip it entirely.
          weight: 0.70
          auto_check:
            kind: regex
            value: '(?i)(correct|appropriate|decorative|right.*approach|well.implemented)'

        - id: wcag-rationale-given
          description: >
            Agent explains why this pattern is correct: decorative images should be
            hidden from assistive technology to avoid noise. alt="" alone suffices per
            WCAG 1.1.1; aria-hidden adds belt-and-suspenders coverage.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(decorative|skip.*screen.*reader|hidden.*assistive|1\.1\.1|aria-hidden.*correct)'

  # ── Case 4: Icon button without accessible name ───────────────────────────────
  - id: accessibility-auditor/positive-icon-button-no-label
    description: >
      A button contains only an SVG icon with no visible text and no ARIA label.
      Screen readers would announce it as an unlabeled button. Agent must flag
      the missing accessible name and suggest aria-label or visually hidden text.
    tags: [happy-path, a11y, certification]
    seed: 4004

    input:
      messages:
        - role: user
          content: |
            Review this toolbar component for accessibility issues:

            ```jsx
            function Toolbar({ onDelete, onShare, onDownload }) {
              return (
                <div role="toolbar" aria-label="Document actions">
                  <button onClick={onDelete}>
                    <TrashIcon size={20} />
                  </button>
                  <button onClick={onShare}>
                    <ShareIcon size={20} />
                  </button>
                  <button onClick={onDownload} aria-label="Download document">
                    <DownloadIcon size={20} />
                  </button>
                </div>
              );
            }
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(aria-label|accessible.*name|4\.1\.2|unlabeled|no.*label|TrashIcon|ShareIcon)'
        - kind: not_contains
          value: "Download button is inaccessible"
        - kind: not_contains
          value: "toolbar has no label"

      rubric:
        - id: unlabeled-buttons-flagged
          description: >
            Agent flags the Delete and Share buttons as lacking accessible names —
            they contain only SVG icons with no text or aria-label. Screen readers
            would announce them as unlabeled buttons.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(TrashIcon|ShareIcon|Delete.*button|Share.*button|no.*label|aria-label.*missing)'

        - id: labeled-button-not-flagged
          description: >
            The Download button (has aria-label="Download document") is NOT flagged.
          weight: 0.25
          auto_check:
            kind: not_contains
            value: "Download button is"

        - id: remediation-specific
          description: >
            Agent recommends aria-label="Delete document" and aria-label="Share document"
            (or a visually-hidden text span) for the flagged buttons.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(aria-label.*Delete|aria-label.*Share|visually.hidden|sr-only|aria-label.*add)'

  # ── Case 5: Incorrect heading hierarchy ──────────────────────────────────────
  - id: accessibility-auditor/positive-heading-hierarchy
    description: >
      Page uses headings that skip levels (<h1> followed immediately by <h3>),
      breaking the document outline for screen reader navigation. Agent must flag
      the skipped level and explain the navigation impact for screen reader users.
    tags: [edge-case, a11y, certification]
    seed: 4005

    input:
      messages:
        - role: user
          content: |
            Review this page structure for accessibility issues:

            ```html
            <main>
              <h1>Annual Report 2024</h1>
              <section>
                <h3>Executive Summary</h3>
                <p>Revenue grew 23% year over year...</p>
              </section>
              <section>
                <h3>Financial Highlights</h3>
                <p>Operating income reached...</p>
              </section>
            </main>
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(heading.*hierarch|skip.*level|h1.*h3|missing.*h2|2\.4\.6|1\.3\.1)'
        - kind: regex
          value: '(?i)(screen.*reader|navigate.*heading|heading.*navigation|outline|document.*structure)'

      rubric:
        - id: skipped-heading-level-flagged
          description: >
            Agent flags the jump from <h1> to <h3>, skipping <h2>. Cites WCAG 1.3.1
            or 2.4.6 and recommends inserting <h2> elements or changing <h3> to <h2>.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(skip.*h2|h1.*h3|missing.*h2|h2.*missing|skipped.*level|1\.3\.1|2\.4\.6)'

        - id: navigation-impact-explained
          description: >
            Agent explains the practical impact: screen reader users navigate by headings
            to scan document structure — skipped levels create a confusing outline.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(screen.*reader.*navigate|heading.*navigation|outline|confusing|skip.*level.*impact)'

        - id: remediation-given
          description: >
            Agent recommends either changing <h3> to <h2> or adding a visually hidden
            <h2> if the visual design requires <h3> styling.
          weight: 0.20
          auto_check:
            kind: regex
            value: '(?i)(change.*h2|replace.*h2|h3.*to.*h2|add.*h2|visually.hidden.*h2)'
