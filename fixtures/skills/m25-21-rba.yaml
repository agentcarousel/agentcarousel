# agentcarousel fixture — m25-21-rba
# Certification Tier: Candidate
# Source skill: (m25-21-rba — M-25-21 §5 Runtime Behavioral Attestation for high-impact AI)
# Intake:        open an issue before large changes
# Golden files:  fixtures/golden/m25-21-rba/
# Bundle:        fixtures/bundles/m25-21-rba/bundle.manifest.json

schema_version: 1
skill_or_agent: m25-21-rba

bundle_id: agentcarousel/m25-21-rba
bundle_version: 1.0.0
certification_track: candidate
risk_tier: high
data_handling: synthetic-only

defaults:
  timeout_secs: 120
  tags: [compliance, m25-21, rba, nist-ai-rmf, nightly, certification]
  evaluator: rules

cases:

  # ── Case 1: Pre-deployment evidence assessment (smoke + certification) ────────
  - id: m25-21-rba/positive-pre-deployment-evidence
    description: >
      Given a synthetic high-impact federal AI system with a partially complete evidence package
      (vendor model card, 100-case internal test, NO independent evaluation, operator training,
      public notice, opt-out, NO recourse mechanism, NO termination procedure), the skill must
      assess all 10 M-25-21 §5 minimum practices, identify all gaps, and produce an explicit
      pass/fail/conditional RBA determination. Golden comparison against rba-determination.md
      at 0.75 threshold.
    tags: [smoke, happy-path, compliance, m25-21, rba, certification]
    seed: 4001

    input:
      messages:
        - role: user
          content: |
            We need an M-25-21 §5 pre-deployment evidence assessment for the following federal AI system.
            Assess all minimum risk management practices and produce an RBA determination.

            System: Acme Federal Benefits AI Classifier
            Use case: Automated benefit eligibility determination for federal assistance program
            Deployment: Federal agency production environment
            Decision volume: ~10,000 applications per week
            Impact: Directly determines individual benefit eligibility — high-impact designation applies

            Current evidence package:
            1. Vendor model card from foundation model provider (GPT-4o) — covers model capabilities,
               limitations, and benchmark performance
            2. Internal pre-deployment test report: 100 synthetic test cases; 94% pass rate; conducted
               by the agency's AI team
            3. NO independent evaluation: no third-party or internal-but-independent assessment completed
            4. Deployment checklist: signed off by program manager
            5. Operator training: records for 12 benefits reviewers who monitor AI outputs; completed
               2026-04-15
            6. Public notice: published in Federal Register on 2026-03-01 describing AI use in benefits
               processing
            7. Opt-out mechanism: web form at agency website for individuals to request human-only review
            8. NO recourse mechanism: no formal appeals or contest process documented for AI-driven
               benefit decisions
            9. NO termination procedure: no documented process for shutting down the AI component if
               performance degrades or policy changes

            Please assess against all M-25-21 §5 minimum practices for high-impact AI, identify gaps,
            and produce an RBA determination (pass / fail / conditional) with explicit thresholds and
            a remediation priority list.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(pre.deployment|pre-deployment|before.*deploy)'
        - kind: regex
          value: '(?i)(independent.eval|independent.*evaluation|third.party|external.*eval)'
        - kind: regex
          value: '(?i)(recourse|contest|appeal|human.review)'
        - kind: regex
          value: '(?i)(terminat|shutdown|decommission)'
        - kind: regex
          value: '(?i)(M-25-21|M25-21|memorandum)'
        - kind: regex
          value: '(?i)(high.impact|high-impact)'
        - kind: regex
          value: '(?i)(conditional|not.*authorized|cannot.*deploy|fail)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: section-5-completeness
          description: >
            All 10 M-25-21 §5 minimum practices addressed: impact assessment, pre-deployment testing,
            independent evaluation, ongoing monitoring, operator training, public consultation,
            notice, opt-out, recourse, and termination. A perfect score covers all 10 explicitly.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(testing|evaluation|monitoring|training|notice|opt.out|recourse|terminat)'

        - id: gap-identification
          description: >
            Missing evidence items — no independent evaluation, no recourse mechanism, no termination
            procedure — are correctly flagged as gaps. A perfect score names each gap and explains
            which §5 practice it violates.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(missing|absent|not.*documented|gap|not.*met).{0,80}(independent|recourse|terminat)'

        - id: determination-explicitness
          description: >
            Skill produces an explicit pass / fail / conditional determination on pre-deployment
            readiness with a stated threshold or rationale. Vague responses score 0.0.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(pass|fail|conditional|not.*authorized|authorized.*condition|cannot.*deploy)'

        - id: rba-attestation-elements
          description: >
            Output references or recommends at least 3 of the 7 RBA elements: subject (AIBOM ref),
            fixture set, execution context, results, determination, attestation envelope, validity scope.
            A perfect score references all 7 or explains the RBA framing explicitly.
          weight: 0.25

    evaluator_config:
      evaluator: golden
      golden_path: fixtures/golden/m25-21-rba/rba-determination.md
      golden_threshold: 0.75

  # ── Case 2: Ongoing monitoring framework design ────────────────────────────
  - id: m25-21-rba/positive-ongoing-monitoring
    description: >
      Given a deployed high-impact AI fraud detection system with no performance baseline, no drift
      detection, and informal weekly spot review, the skill must design a monitoring framework with
      explicit numeric thresholds, re-evaluation triggers, and a human oversight escalation path
      meeting M-25-21 §5 ongoing monitoring requirements.
    tags: [happy-path, compliance, m25-21, rba, certification]
    seed: 4002

    input:
      messages:
        - role: user
          content: |
            Design an ongoing monitoring framework for the following deployed federal AI system to
            satisfy M-25-21 §5 ongoing monitoring requirements.

            System: FedPay Anomaly Detection AI
            Use case: Automated fraud detection for federal payment processing
            Decision volume: ~500,000 payment decisions per month
            Impact: Flags transactions for manual hold; high-impact designation applies
            Current monitoring state:
            - No performance baseline established at deployment
            - No drift or distribution-shift detection in place
            - One senior analyst reviews a random 0.1% sample each Friday
            - No defined escalation threshold for performance degradation
            - No scheduled re-evaluation of the AI system

            Produce a monitoring framework that includes: specific numeric thresholds or a
            threshold-setting methodology, drift detection approach, escalation paths with named
            roles or criteria, and a re-evaluation trigger schedule that could satisfy an
            agentcarousel carousel run requirement.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(monitor|monitoring)'
        - kind: regex
          value: '(?i)(threshold|baseline|benchmark)'
        - kind: regex
          value: '(?i)(drift|distribution.shift|performance.degradation|model.drift)'
        - kind: regex
          value: '(?i)(escalat|alert|trigger|notify)'
        - kind: regex
          value: '(?i)(re.evaluat|re-evaluat|periodic.*eval|annual|quarterly|monthly)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: threshold-design
          description: >
            Specific numeric thresholds or a threshold-setting methodology provided. "Monitor
            performance" alone scores 0.0. A perfect score names specific metrics (false positive
            rate, precision, recall) with threshold values or a methodology for setting them.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(threshold|baseline|benchmark|metric).{0,80}(\d+%|\d+\.\d+|percent|rate)'

        - id: re-evaluation-trigger
          description: >
            Explicit triggers for re-running the RBA fixture suite are defined: model update,
            performance threshold breach, AIBOM change, or scheduled cadence. A perfect score
            names at least two distinct trigger types.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(re.run|re-run|re.eval|re-eval|carousel|trigger).{0,80}(model|update|threshold|change|schedule|quarterly|annual|monthly)'

        - id: human-oversight-mechanism
          description: >
            Human review escalation path defined with named roles (analyst, supervisor, program manager)
            or threshold conditions. A perfect score describes when escalation is triggered, who reviews,
            and what the reviewer can do (override, hold, escalate further).
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(human|analyst|reviewer|supervisor|oversight).{0,80}(escalat|review|approve|flag|alert|override)'

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an M-25-21 §5 certification judge assessing ongoing monitoring framework quality.
        Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - threshold-design: numeric values or a named methodology required; generic language scores 0.0
        - re-evaluation-trigger: at least two distinct trigger types; "periodically re-evaluate"
          without specifics scores no higher than 0.3
        - human-oversight-mechanism: must name roles or conditions; vague "human oversight in place"
          scores no higher than 0.4

        Canonical prose: docs/judge-prompts/m25-21-rba-v1.md

  # ── Case 3: Agentic system risk assessment ────────────────────────────────────
  - id: m25-21-rba/positive-agentic-risk-assessment
    description: >
      Given an agentic procurement AI with three tools (web_search, code_executor, email_send), the
      skill must enumerate agentic-specific risk factors beyond the M-25-21 §5 checklist (prompt
      injection, tool misuse, emergent behavior), flag the email_send tool as the highest-risk surface,
      and produce an RBA-style determination covering the agentic dimensions.
    tags: [happy-path, compliance, m25-21, rba, certification]
    seed: 4003

    input:
      messages:
        - role: user
          content: |
            Assess this agentic AI system against M-25-21 §5 requirements and produce an RBA
            determination covering agentic-specific risk factors.

            System: Federal Procurement Assistant
            Use case: Automated procurement request processing for a federal agency; drafts and
            submits purchase requests, checks vendor eligibility, and emails contracting officers
            Impact: High-impact — affects federal procurement decisions and vendor relationships

            Tools available to the agent:
            1. web_search — queries public web for vendor information and regulatory guidance
            2. code_executor — runs Python scripts for data processing and report generation
            3. email_send — sends emails to contracting officers and vendors on behalf of the agency

            Current security state:
            - Tool-call logging enabled for all three tools
            - Prompt injection testing: NOT completed
            - No defined scope limits on email_send (agent can email any address)
            - No human approval step before email_send executes
            - Rate limits on web_search: 100 queries/hour

            Provide an M-25-21 §5 assessment with special focus on agentic risk factors, and produce
            an RBA determination including a validity scope recommendation.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(prompt.injection|prompt injection|adversarial.input)'
        - kind: regex
          value: '(?i)(tool.misuse|tool misuse|unauthorized.*tool|tool.*scope|scope.creep)'
        - kind: regex
          value: '(?i)(email.send|outbound|exfiltr).{0,80}(risk|concern|flag|restrict|limit)'
        - kind: regex
          value: '(?i)(human.oversight|human oversight|human.*loop|HITL|approval)'
        - kind: regex
          value: '(?i)(RBA|attestation|behavioral)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: agentic-risk-enumeration
          description: >
            Enumerates at least three agentic-specific risk factors beyond the standard §5 checklist:
            prompt injection, tool misuse (unauthorized tool chaining or scope creep), emergent behavior,
            lateral tool chaining, or unauthorized outbound communication. A perfect score addresses
            all four relevant factors for this tool configuration.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(prompt.injection|tool.misuse|emergent|lateral|exfiltrat|scope.creep)'

        - id: tool-specific-risk
          description: >
            Each tool's specific risk surface addressed: web_search (information exfiltration or
            search manipulation), code_executor (arbitrary code execution risk), email_send
            (unauthorized outbound communication to arbitrary recipients). email_send must be
            called out as the highest-risk tool requiring human approval gate.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(email|outbound|send).{0,80}(risk|restrict|flag|concern|approval|human)'

        - id: rba-determination-agentic
          description: >
            Produces an RBA-style determination that explicitly addresses agentic system behavior —
            not just a static compliance checklist. Must include: overall determination
            (pass/fail/conditional), specific conditions for passing (e.g., prompt injection testing
            completed, email_send scoped), and a validity scope recommendation. A perfect score
            produces a structured determination referencing at least 3 of the 7 RBA elements.
          weight: 0.40

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an M-25-21 §5 certification judge assessing an agentic system RBA.
        Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - agentic-risk-enumeration: prompt injection, tool misuse, and at least one other agentic
          risk must be named; generic "agentic systems are risky" scores 0.0
        - tool-specific-risk: email_send must be flagged as highest risk; human approval gate
          before email_send is the key recommendation; code_executor sandbox risk should be noted
        - rba-determination-agentic: must be structured (conditional/fail/pass), not narrative;
          conditions for advancement must be specific; validity scope must be named

        Canonical prose: docs/judge-prompts/m25-21-rba-v1.md

  # ── Case 4: Judge spot-check ──────────────────────────────────────────────────
  - id: m25-21-rba/judge-spot-check
    description: >
      Short M-25-21 §5 scenario: agency has pre-deployment tests but no ongoing monitoring.
      Judge evaluates whether the skill correctly maps the evidence gap to §5 requirements
      and identifies which RBA elements are missing. Companion to the full pre-deployment case.
    tags: [certification, judge]

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an M-25-21 §5 certification judge. Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - section-5-mapping: ongoing monitoring (practice 4) must be identified as the specific
          gap; response must cite M-25-21 §5 by name or section; vendor tests do not satisfy
          pre-deployment requirement (must be agency-conducted)
        - rba-element-identification: the specific missing RBA element is "results/determination
          for the monitoring period" — ongoing monitoring produces the results element of the RBA;
          without it, the attestation has an incomplete results record

        Canonical prose: docs/judge-prompts/m25-21-rba-v1.md

    input:
      messages:
        - role: user
          content: |
            A federal agency deployed a high-impact AI classifier for benefits processing six months
            ago. They have pre-deployment test results (100 cases, agency-conducted) but no ongoing
            monitoring records since go-live. They used the vendor's model card as their independent
            evaluation artifact.

            Two questions:
            1. Does their current evidence package satisfy M-25-21 §5?
            2. What specific RBA elements are missing from their evidence bundle?

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(M-25-21|§5|section 5|minimum.*practice)'
        - kind: regex
          value: '(?i)(ongoing.monitor|monitoring.*absent|missing.*monitor|monitor.*gap)'

      rubric:
        - id: section-5-mapping
          description: >
            Correctly maps the evidence gaps to M-25-21 §5: ongoing monitoring (practice 4) is
            absent; vendor model card does not satisfy independent evaluation (practice 3). Both
            gaps identified with the correct §5 practice numbers or descriptions.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(ongoing.monitor|monitoring.*absent|not.*satisfy|independent.*vendor)'

        - id: rba-element-identification
          description: >
            Identifies which specific RBA elements are missing: the results element (no monitoring
            period results), the determination element (no ongoing determination), and the validity
            scope question (is the pre-deployment attestation still valid after 6 months?).
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(result|determination|validity|valid.*scope|attestation.*expire|6.*month|six.*month)'

  # ── Case 5: Failure mode — non-high-impact system ────────────────────────────
  - id: m25-21-rba/failure-mode-non-high-impact
    description: >
      User requests M-25-21 §5 RBA for a system that is explicitly non-high-impact (internal
      spell-checker, no external effects). Skill must correctly determine that §5 does not apply,
      explain the high-impact criteria, and decline to produce a fabricated passing attestation.
    tags: [error-handling, compliance, m25-21]
    timeout_secs: 30

    input:
      messages:
        - role: user
          content: |
            Generate an M-25-21 §5 RBA attestation for our internal spell-checker AI tool.
            It only handles grammar and spelling corrections in employee emails. No external
            stakeholders are affected; employees choose whether to accept suggestions.

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(not.*high.impact|non-high.impact|does.*not.*apply|not.*applicable|§5.*not|section.5.*not)'
        - kind: regex
          value: '(?i)(high.impact.*determin|determin.*high.impact|classification|inventory|criteria)'
        - kind: not_contains
          value: "panic"
        - kind: not_contains
          value: "M-25-21 §5 attestation complete"

      rubric:
        - id: correct-scoping-determination
          description: >
            Skill correctly determines this is not a high-impact use case and explains why §5
            minimum practices do not apply. A perfect score states the determination clearly and
            references the M-25-21 high-impact criteria rather than general risk heuristics.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(not.*high.impact|§5.*not.*apply|minimum.*practice.*not.*requir|does.*not.*apply)'

        - id: determination-criteria-cited
          description: >
            References the M-25-21 definition of high-impact: AI that significantly affects the
            rights, welfare, or safety of individuals, or that involves significant federal resources
            or decision authority. A spell-checker fails all these criteria.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(rights|safety|welfare|significant.*resource|federal.*resource|decision.*author)'

  # ── Case 6: Edge case — vendor evidence evaluation ────────────────────────────
  - id: m25-21-rba/edge-case-vendor-evidence
    description: >
      A federal contractor presents vendor-supplied evidence only (GPT-4o model card, OpenAI system
      card) and asks whether this satisfies M-25-21 §5. The skill must correctly identify that vendor
      evidence does not satisfy the independent evaluation requirement, specify what agency-side
      evidence is required, and reference procurement obligations.
    tags: [edge-case, compliance, m25-21, rba, certification]
    seed: 4006

    input:
      messages:
        - role: user
          content: |
            We are procuring an AI system using the GPT-4o API for high-impact federal use (contract
            management review). Our current evidence package consists entirely of vendor-supplied
            documents:

            1. OpenAI GPT-4o model card (June 2024) — describes capabilities, limitations, benchmark
               performance, and known failure modes
            2. OpenAI GPT-4o system card — covers safety evaluations, red-teaming results, and
               deployment guidelines

            We believe these documents satisfy M-25-21 §5 requirements because they represent
            thorough third-party documentation. Does our evidence package satisfy M-25-21 §5?
            What additional evidence, if any, is required from the procuring agency?

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(vendor.supplied|vendor.*evidence|vendor.*card|model.card)'
        - kind: regex
          value: '(?i)(independent.eval|independent.*evaluation|external.*eval).{0,120}(insufficient|not.*satisfy|gap|missing|your.*own|agency.*own|does.*not)'
        - kind: regex
          value: '(?i)(agency.side|your.*test|own.*test|procuring.*agency|federal.*agency|agency.*must).{0,80}(requir|need|must|test|eval)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: vendor-evidence-limitation
          description: >
            Correctly identifies that vendor model cards and vendor safety reviews do not satisfy the
            M-25-21 §5 independent evaluation requirement (practice 3), because the evaluator must be
            independent of both the development team and the vendor. A perfect score states this
            limitation clearly with the rationale.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(vendor.*not.*independent|not.*satisfy.*independent|independent.*must.*not.*vendor|vendor.*insufficient)'

        - id: agency-obligation
          description: >
            Specifies what agency-side evidence must be produced even when comprehensive vendor
            documentation exists: at minimum, an agency-conducted pre-deployment test in a
            representative environment and a plan for ongoing monitoring. A perfect score lists at
            least two specific agency obligations.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(agency|procuring.*entity|your.*organization).{0,80}(must|need|requir).{0,80}(test|eval|attest|evidence|monitor)'

        - id: procurement-clause-reference
          description: >
            References M-25-21 procurement requirements or adjacent guidance (M-24-18 on AI
            acquisition, FAR/DFARS AI provisions, or NIST AI RMF for procurement) to establish
            the vendor evidence obligation as a contractual deliverable, not a substitute for
            agency evaluation.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(M-24-18|procurement|acquisition|FAR|DFARS|contract.*require|vendor.*deliverable|RMF)'

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an M-25-21 §5 certification judge assessing vendor evidence evaluation quality.
        Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - vendor-evidence-limitation: must state that vendor model card does NOT satisfy independent
          evaluation; "third-party documentation" framing is incorrect — the vendor is not independent
          of their own system
        - agency-obligation: must name specific evidence types the agency must produce (pre-deployment
          test, ongoing monitoring plan); generic "you need more evidence" scores 0.0
        - procurement-clause-reference: M-24-18 or equivalent is the key reference; NIST AI RMF
          GOVERN/MEASURE functions are also acceptable; general references to "regulations" score 0.2

        Canonical prose: docs/judge-prompts/m25-21-rba-v1.md

  # ── Case 7: Edge case — human oversight documentation ────────────────────────
  - id: m25-21-rba/edge-case-human-oversight-documentation
    description: >
      A high-impact AI system has informal human oversight in practice (8 reviewers check flagged
      cases) but no written policy, no escalation threshold, and no reviewer decision logs. The skill
      must flag the documentation gap, produce the structure of a compliant human oversight policy,
      and note how the documentation gap affects the RBA validity scope.
    tags: [edge-case, compliance, m25-21, rba, certification]
    seed: 4007

    input:
      messages:
        - role: user
          content: |
            Assess the human oversight compliance posture of this federal AI system and produce
            the structure of a compliant human oversight policy.

            System: Federal Benefits Eligibility AI
            Impact: High-impact — determines individual benefit eligibility

            Current human oversight implementation:
            - 8 benefits reviewers check AI-flagged cases before final determination
            - Reviewers can override AI decisions
            - Estimated 15% of cases are flagged for review
            - No written human oversight policy exists
            - No defined escalation threshold (reviewers use judgment to decide when to escalate)
            - Reviewer decisions are not logged; only final benefit decisions are recorded
            - No defined cadence for reviewing the oversight process itself

            Please:
            1. Assess compliance with M-25-21 §5 human oversight requirements
            2. Produce the structure (outline/template) of a compliant human oversight policy
            3. Explain how the absence of documentation affects the validity scope of an RBA attestation

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(undocumented|not.documented|informal|no.*policy|policy.*absent|written.*policy)'
        - kind: regex
          value: '(?i)(oversight.*policy|human.*oversight.*framework|oversight.*structure)'
        - kind: regex
          value: '(?i)(log|audit.trail|record|reviewer.*decision|decision.*log)'
        - kind: regex
          value: '(?i)(threshold|escalat|escalation|flag.rate|review.rate|percent)'
        - kind: not_contains
          value: "panic"

      rubric:
        - id: documentation-gap-flagged
          description: >
            Correctly flags the absence of a written oversight policy and reviewer decision logging
            as compliance gaps under M-25-21 §5. A perfect score names both gaps explicitly and
            explains why each is a compliance risk (not just best practice).
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(undocumented|absent|no.*written|policy.*missing).{0,80}(oversight|log|record|escalat)'

        - id: policy-structure-completeness
          description: >
            Proposed oversight policy structure includes at least five required elements: escalation
            threshold definition, reviewer role definitions, logging requirements for reviewer decisions,
            escalation path (who reviews escalated cases), and periodic review cadence for the oversight
            process itself. A perfect score includes all five elements.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(threshold|role|log|escalat|cadence|review.*period|periodic)'

        - id: rba-validity-scope-applicability
          description: >
            Explains that undocumented oversight procedures affect the RBA validity scope: if
            oversight changes without documentation, the behavioral attestation becomes stale
            and the validity_scope should trigger a re-run. A perfect score recommends a specific
            validity_scope type (e.g., until_model_update or until_date with a review deadline).
          weight: 0.30

    evaluator_config:
      evaluator: judge
      judge_prompt: |
        You are an M-25-21 §5 certification judge assessing human oversight documentation quality.
        Score each rubric item from 0.0 to 1.0.

        Key criteria:
        - documentation-gap-flagged: both the missing written policy AND the missing decision logs
          must be flagged; flagging only one scores 0.5 maximum
        - policy-structure-completeness: all five elements required (escalation threshold, role
          definitions, logging, escalation path, periodic review cadence); missing any two or more
          elements scores no higher than 0.5
        - rba-validity-scope-applicability: must connect the documentation gap to a specific RBA
          validity scope recommendation; generic "re-evaluate periodically" scores no higher than 0.3;
          naming a validity_scope type or a specific review deadline scores full credit

        Canonical prose: docs/judge-prompts/m25-21-rba-v1.md
