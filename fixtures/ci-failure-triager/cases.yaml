# agentcarousel fixture — ci-failure-triager
# Certification Tier: Candidate
# Source skill: CI build failure diagnosis and root-cause recommendation agent
# Golden files:  fixtures/ci-failure-triager/golden/
# Bundle:        fixtures/bundles/ci-failure-triager/bundle.manifest.json

schema_version: 1
skill_or_agent: ci-failure-triager

bundle_id: agentcarousel/ci-failure-triager
bundle_version: 1.0.0
certification_track: candidate
risk_tier: low
data_handling: synthetic-only

defaults:
  timeout_secs: 60
  tags: [ci-cd, devops, debugging, nightly, certification]
  evaluator: rules

cases:

  # ── Case 1: JavaScript heap OOM (smoke + certification) ───────────────────────
  - id: ci-failure-triager/positive-oom-kill
    description: >
      Jest test run terminates with a V8 heap OOM. Agent must identify JavaScript
      out-of-memory as the root cause, not a test logic bug, and recommend at least
      one concrete remedy (NODE_OPTIONS, --runInBand, or suite splitting).
    tags: [smoke, happy-path, ci-cd, certification]
    seed: 3001

    input:
      messages:
        - role: user
          content: |
            Our CI run just failed. Diagnose the root cause and recommend a fix:

            ```
            PASS src/api/users.test.ts (41.3s)
            PASS src/api/orders.test.ts (38.7s)
            PASS src/api/products.test.ts (44.1s)

            <--- Last few GCs --->
            [19201:0x7f2b4c000000] 148392 ms: Mark-sweep (reduce) 3998.8 (4097.5) -> 3996.1 MB

            <--- JS stacktrace --->
            FATAL ERROR: Reached heap limit Allocation failed - JavaScript heap out of memory
            Writing V8 crash dump to file: /tmp/v8-oom-1749081234.json

            Killed

            npm ERR! Test failed. See above for more details.
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(heap|out of memory|OOM|memory limit|V8)'
        - kind: regex
          value: '(?i)(NODE_OPTIONS|max-old-space|--runInBand|split.*test|reduce.*concurren)'
        - kind: not_contains
          value: "test logic error"
        - kind: not_contains
          value: "syntax error"

      rubric:
        - id: oom-root-cause-identified
          description: >
            Agent correctly identifies JavaScript heap out-of-memory as the root cause —
            not a test assertion failure or code bug. A perfect score cites the
            "FATAL ERROR: Reached heap limit" message.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(heap.*limit|out of memory|OOM|memory.*exhausted|V8.*crash)'

        - id: progressive-nature-noted
          description: >
            Agent observes that earlier test files passed (users, orders, products) —
            suggesting memory accumulates progressively across the test suite.
          weight: 0.20
          auto_check:
            kind: regex
            value: '(?i)(earlier.*pass|previous.*pass|progressive|accumulate|grow|build up)'

        - id: concrete-remedy-given
          description: >
            At least one specific fix: NODE_OPTIONS=--max-old-space-size=N, --runInBand
            to reduce parallel worker memory, or splitting the suite into smaller shards.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(NODE_OPTIONS|max-old-space-size|--runInBand|run.*band|shard|split.*suite)'

    evaluator_config:
      evaluator: golden
      golden_path: fixtures/ci-failure-triager/golden/oom-diagnosis.txt
      golden_threshold: 0.70
      effectiveness_threshold: 0.6

  # ── Case 2: Missing environment variable ─────────────────────────────────────
  - id: ci-failure-triager/positive-missing-env-var
    description: >
      Application startup fails because a required environment variable is absent.
      Agent must identify the specific missing variable, explain it is a CI configuration
      issue not a code bug, and recommend adding it to CI secrets or environment.
    tags: [happy-path, ci-cd, certification]
    seed: 3002

    input:
      messages:
        - role: user
          content: |
            CI failed on startup. What went wrong?

            ```
            > node dist/server.js

            /app/dist/config.js:14
              throw new Error(`Missing required environment variable: DATABASE_URL`);
                    ^

            Error: Missing required environment variable: DATABASE_URL
                at validateConfig (/app/dist/config.js:14:13)
                at Object.<anonymous> (/app/dist/server.js:8:1)

            npm ERR! code 1
            npm ERR! path /app
            npm ERR! command failed
            npm ERR! command sh -c node dist/server.js
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(DATABASE_URL|environment variable|env var|secret)'
        - kind: regex
          value: '(?i)(CI.*secret|secret.*CI|repository.*secret|GitHub.*secret|environment.*setting|add.*variable|configure.*env)'
        - kind: not_contains
          value: "code bug"
        - kind: not_contains
          value: "syntax error in"

      rubric:
        - id: missing-var-identified
          description: >
            Agent names DATABASE_URL as the missing variable. A perfect score quotes
            the exact error message line.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(DATABASE_URL)'

        - id: ci-config-diagnosis
          description: >
            Agent correctly identifies this as a CI configuration issue (missing secret
            or env var in the CI environment) — not a bug in application code.
          weight: 0.35
          auto_check:
            kind: regex
            value: '(?i)(CI.*config|not.*code.*bug|configuration|env.*not.*set|CI.*environment|secret.*not.*add)'

        - id: remedy-actionable
          description: >
            Agent recommends adding DATABASE_URL to CI secrets/environment variables
            with a specific next step (e.g. repository Settings → Secrets).
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(add.*DATABASE_URL|Settings.*Secret|repo.*secret|CI.*variable|environment.*setting)'

  # ── Case 3: Flaky timing-dependent test ──────────────────────────────────────
  - id: ci-failure-triager/positive-flaky-timing-test
    description: >
      A test that asserts on wall-clock duration fails intermittently (~1 in 5 runs).
      Agent must identify this as a flaky test caused by timing-dependent assertions,
      not a genuine regression, and recommend fake timers or behavior-based testing.
    tags: [happy-path, ci-cd, certification]
    seed: 3003

    input:
      messages:
        - role: user
          content: |
            This failure happens about 1 in 5 runs on the same unchanged commit. Help me diagnose it:

            ```
            FAIL src/jobs/scheduler.test.ts
              ● JobScheduler › processes job within 500ms

                expect(received).toBeLessThan(expected)

                Expected: < 500
                Received: 623

                  43 |   const start = Date.now();
                  44 |   await scheduler.processJob(job);
                > 45 |   expect(Date.now() - start).toBeLessThan(500);
                     |                              ^
                  46 | });

            Test Suites: 1 failed, 1 passed, 2 total
            Tests:       1 failed, 11 passed, 12 total
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(flak|non-deterministic|timing|intermittent|wall.clock|unstable|unreliable)'
        - kind: regex
          value: '(?i)(fake.*timer|mock.*timer|jest\.useFakeTimers|behavior.*not.*timing|remove.*timing|increase.*threshold|retry)'
        - kind: not_contains
          value: "genuine regression"
        - kind: not_contains
          value: "scheduler is broken"

      rubric:
        - id: flakiness-identified
          description: >
            Agent identifies this as a flaky test from timing-dependent assertion, not
            a real scheduler bug. Correctly notes the 1-in-5 intermittency is the
            signature of a non-deterministic test.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(flak|timing.*dependent|non-deterministic|wall.clock|intermittent)'

        - id: root-cause-precise
          description: >
            Agent explains that asserting on wall-clock elapsed time is fragile under
            CI load variance — the same code can take 400ms or 700ms depending on
            system load.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(load|system.*load|CI.*load|resource.*contention|variable.*timing|cpu.*usage)'

        - id: fix-recommended
          description: >
            Agent recommends using Jest fake timers (jest.useFakeTimers) or testing
            behavior (was the job processed?) rather than duration.
          weight: 0.30
          auto_check:
            kind: regex
            value: '(?i)(fake.*timer|useFakeTimers|mock.*time|behavior|assert.*result|not.*duration)'

  # ── Case 4: npm dependency conflict ──────────────────────────────────────────
  - id: ci-failure-triager/positive-dependency-conflict
    description: >
      npm install fails with a peer dependency conflict. Agent must identify the
      conflicting packages by name, explain why the conflict exists, and recommend
      a resolution strategy.
    tags: [happy-path, ci-cd]
    seed: 3004

    input:
      messages:
        - role: user
          content: |
            CI fails on dependency installation. What's wrong?

            ```
            npm warn ERESOLVE overriding peer dependency
            npm error code ERESOLVE
            npm error ERESOLVE unable to resolve dependency tree
            npm error
            npm error While resolving: myapp@1.0.0
            npm error Found: react@18.3.1
            npm error node_modules/react
            npm error   react@"^18.0.0" from the root project
            npm error
            npm error Could not resolve dependency:
            npm error peer react@"^17.0.0" from legacy-ui-lib@2.4.1
            npm error node_modules/legacy-ui-lib
            npm error   legacy-ui-lib@"^2.4.1" from the root project
            npm error
            npm error Fix the upstream dependency conflict, or retry
            npm error this command with --force or --legacy-peer-deps
            npm error   to accept an incorrect (and potentially broken) solution.
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(legacy-ui-lib|react.*18|peer.*depend|version.*conflict)'
        - kind: regex
          value: '(?i)(upgrade.*legacy-ui-lib|--legacy-peer-deps|downgrade.*react|alternative.*library|fork|patch)'

      rubric:
        - id: conflict-identified
          description: >
            Agent names both parties: legacy-ui-lib@2.4.1 requires React 17 but the
            project uses React 18.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(legacy-ui-lib|react.*18.*17|17.*18|peer.*react)'

        - id: options-ranked
          description: >
            Agent presents resolution options in order of safety: (1) upgrade
            legacy-ui-lib if a React 18-compatible version exists, (2) use
            --legacy-peer-deps as a temporary workaround with caveats, (3) replace
            the library.
          weight: 0.40
          auto_check:
            kind: regex
            value: '(?i)(upgrade.*legacy-ui-lib|newer.*version|--legacy-peer-deps|replace|alternative)'

        - id: force-flag-caveated
          description: >
            If --force or --legacy-peer-deps is mentioned, agent notes it is a
            workaround that may cause runtime errors, not a permanent fix.
          weight: 0.20
          auto_check:
            kind: regex
            value: '(?i)(caveat|workaround|risk|may.*break|not.*permanent|temporary|runtime.*error)'

  # ── Case 5: Shared fixture teardown race ─────────────────────────────────────
  - id: ci-failure-triager/edge-case-shared-fixture-teardown
    description: >
      Multiple tests fail simultaneously with database connection errors immediately
      after a test that deletes test data. Agent must identify shared test fixture
      teardown as the root cause — not individual test bugs — and recommend test
      isolation.
    tags: [edge-case, ci-cd, certification]
    seed: 3005

    input:
      messages:
        - role: user
          content: |
            Four tests failed at once. They all passed individually when run alone:

            ```
            FAIL src/api/users.test.ts
            FAIL src/api/orders.test.ts
            FAIL src/api/products.test.ts
            FAIL src/api/reports.test.ts

              ● users › GET /users returns list
                Error: Connection terminated unexpectedly
                    at TLSSocket.<anonymous> (node_modules/pg/lib/connection.js:54:12)

              ● orders › GET /orders returns empty list
                Error: Connection terminated unexpectedly

              ● products › GET /products/1 returns product
                Error: Connection terminated unexpectedly

              ● reports › generateReport creates summary
                Error: Connection terminated unexpectedly

            (Note: db.teardown.test.ts ran immediately before these in the test suite)
            ```

    expected:
      tool_sequence: []

      output:
        - kind: regex
          value: '(?i)(teardown|db\.teardown|shared.*state|shared.*fixture|afterAll|afterEach|cleanup)'
        - kind: regex
          value: '(?i)(isolat|beforeEach|transaction.*rollback|separate.*database|test.*database|in-memory)'
        - kind: not_contains
          value: "each test has a bug"

      rubric:
        - id: shared-teardown-identified
          description: >
            Agent identifies db.teardown.test.ts closing the shared database connection
            as the cause of all four subsequent failures — not independent bugs in each test.
          weight: 0.50
          auto_check:
            kind: regex
            value: '(?i)(teardown|db\.teardown|shared.*connection|close.*connection|afterAll)'

        - id: cascade-pattern-recognized
          description: >
            Agent notes the cascade pattern: simultaneous failures after a teardown step
            is the signature of shared-state destruction, not individual test failures.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(cascade|simultaneous|all.*same.*time|pattern|teardown.*before)'

        - id: isolation-recommended
          description: >
            Agent recommends test isolation: per-test transactions rolled back in afterEach,
            separate test databases per suite, or an in-memory database per test.
          weight: 0.25
          auto_check:
            kind: regex
            value: '(?i)(isolat|transaction.*rollback|beforeEach|per-test|separate.*db|in-memory)'
