site_name: AgentCarousel
site_description: Pytest for AI agents — fixture-driven, CI-gated evaluation with signed evidence bundles.
site_url: https://docs.agentcarousel.com
repo_url: https://github.com/agentcarousel/agentcarousel
repo_name: agentcarousel/agentcarousel
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Concepts: concepts.md
  - Reference:
    - Fixture Format: fixture-format.md
    - Fixture Tags: fixture-tag-examples.md
  - Contributing:
    - Contributing Fixtures: contributing-fixtures.md
    - Fixture Development Process: fixture-development-process.md
  - Judge prompts:
    - CMMC assessor: judge-prompts/cmmc-assessor-v1.md
    - Terraform Sentinel: judge-prompts/terraform-sentinel-scaffold-v1.md
